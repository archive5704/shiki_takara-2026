<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>四季の宝物</title>
<meta name="theme-color" content="#6e8e59" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="四季の宝物" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icons/apple-touch-icon-180.png" />
<link rel="icon" href="./icons/icon-192.png" />
<link rel="stylesheet" href="./assets/styles.css?v=latest_complete_v2_20260706" />
</head>
<body>
<div class="app">
  <header class="panel header">
    <div>
      <h1>四季の宝物</h1>
      <p>彌榮季節の食・気配・暮らしを発見</p>
    </div>
    <button id="addBtn" class="btn primary admin-only hidden">＋ 記録</button>
  </header>

  <section class="panel toolbar">
    <select id="yearSelect" class="select"></select>
    <button id="prevBtn" class="btn soft">←</button>
    <div id="monthTitle" class="month-title">4月</div>
    <button id="nextBtn" class="btn soft">→</button>
    <div class="spacer"></div>
    <button id="loginOpenBtn" class="btn soft">管理用に入る</button>
    <button id="logoutBtn" class="btn soft admin-only hidden">ログアウト</button>
  </section>

  <section class="panel subbar">
    <select id="filterSelect" class="select"></select>
    <select id="sortSelect" class="select">
      <option value="start">開始日順</option>
      <option value="category">カテゴリ順</option>
      <option value="name">名前順</option>
    </select>
    <button id="categoryManageBtn" class="btn soft admin-only hidden">カテゴリ管理</button>
    <div id="viewerNote" class="viewer-note">閲覧用：公開データを見る画面です。</div>
  </section>

  <section class="panel board">
    <div class="board-head">
      <h2 id="monthHeadline">2026年4月</h2>
      <div id="statusText" class="status">読み込み中…</div>
    </div>
    <div class="road-shell">
      <div class="names-wrap"><div id="nameGrid" class="names-grid"></div></div>
      <div id="wrap" class="days-wrap"><div id="roadmap" class="gridline"></div></div>
    </div>
    <div id="legend" class="legend"></div>
  </section>

  <section id="editor" class="panel editor admin-only hidden">
    <div class="editor-head">
      <h3 id="editorTitle">新しく記録する</h3>
      <button id="toggleEditor" class="btn soft">折りたたむ</button>
    </div>
    <div id="formMsg" class="msg"></div>
    <div id="editorBody">
      <div class="fields">
        <div class="field full"><label for="name">たからもの名</label><input id="name" type="text" /></div>
        <div class="field"><label for="start">開始日</label><input id="start" type="date" /></div>
        <div class="field"><label for="end">終了日</label><input id="end" type="date" /></div>
        <div class="field"><label for="categorySelect">カテゴリ</label><select id="categorySelect" class="select"></select></div>
        <div class="field"><label for="colorSelect">進行表の色</label><select id="colorSelect" class="select"></select><div id="colorPalette" class="color-palette" aria-label="進行表の色見本"></div></div>
        <div class="field full"><label for="detail">詳細メモ</label><textarea id="detail"></textarea></div>
        <div class="field full">
          <label for="imageFile">画像アップロード</label>
          <input id="imageFile" type="file" accept="image/*" />
          <div class="image-tools">
            <div id="imagePreview" class="thumb">画像なし</div>
            <div class="image-side">
              <button id="removeImageBtn" type="button" class="btn soft">画像を外す</button>
              <div id="imageStatus" class="small-note">管理用のみ画像アップできます。</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="actions">
      <button id="resetBtn" class="btn soft">入力をリセット</button>
      <button id="saveBtn" class="btn primary">保存する</button>
    </div>
  </section>
</div>

<div id="detailModal" class="overlay">
  <div class="dialog large">
    <div class="dialog-head">
      <div>
        <div id="detailTitle" class="dialog-title"></div>
        <div id="detailMeta" class="meta"></div>
      </div>
      <div class="dialog-actions">
        <button id="detailDelete" class="btn danger admin-only hidden">削除</button>
        <button id="detailEdit" class="btn edit admin-only hidden">修正</button>
        <button id="detailClose" class="btn soft">閉じる</button>
      </div>
    </div>
    <div class="detail-body">
      <div id="detailPhoto" class="photo">画像なし</div>
      <div id="detailNote" class="note"></div>
    </div>
  </div>
</div>

<div id="confirmModal" class="overlay">
  <div class="dialog small">
    <div class="dialog-title">本当に削除しますか</div>
    <p class="dialog-text">この記録を削除します。元に戻せません。</p>
    <div class="dialog-actions">
      <button id="confirmCancel" class="btn soft">キャンセル</button>
      <button id="confirmDelete" class="btn danger">削除する</button>
    </div>
  </div>
</div>

<div id="loginModal" class="overlay">
  <div class="dialog small">
    <div class="dialog-title">管理者ログイン</div>
    <div class="fields one">
      <div class="field"><label for="loginEmail">メールアドレス</label><input id="loginEmail" type="email" autocomplete="username" /></div>
      <div class="field"><label for="loginPassword">パスワード</label><input id="loginPassword" type="password" autocomplete="current-password" /></div>
      <div id="loginMsg" class="msg"></div>
    </div>
    <div class="dialog-actions">
      <button id="loginCancel" class="btn soft">キャンセル</button>
      <button id="loginSubmit" class="btn primary">ログイン</button>
    </div>
  </div>
</div>

<div id="categoryModal" class="overlay">
  <div class="dialog medium">
    <div class="dialog-head">
      <div class="dialog-title">カテゴリ管理</div>
      <button id="categoryClose" class="btn soft">閉じる</button>
    </div>
    <section class="cat-section">
      <h4>新規カテゴリ名登録</h4>
      <div class="cat-add-row">
        <div class="field"><label for="newCategoryName">新しいカテゴリ名</label><input id="newCategoryName" type="text" /></div>
        <div class="field"><label for="newCategorySort">並び順</label><input id="newCategorySort" type="number" placeholder="10" /></div>
        <button id="newCategoryBtn" class="btn primary">追加する</button>
      </div>
    </section>
    <section class="cat-section">
      <h4>カテゴリ一覧</h4>
      <div id="categoryList"></div>
    </section>
  </div>
</div>

<div id="categoryActionModal" class="overlay">
  <div class="dialog small">
    <div id="categoryActionTitle" class="dialog-title">カテゴリ操作</div>
    <div id="categoryActionBody" class="fields one"></div>
    <div class="dialog-actions">
      <button id="categoryActionCancel" class="btn soft">キャンセル</button>
      <button id="categoryActionSubmit" class="btn primary">実行する</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./assets/supabase.js?v=latest_complete_v2_20260706"></script>
<script src="./assets/auth.js?v=latest_complete_v2_20260706"></script>
<script src="./assets/app.js?v=latest_complete_v2_20260706"></script>
</body>
</html>
