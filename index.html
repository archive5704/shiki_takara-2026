<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>四季の宝物</title>
  <meta name="theme-color" content="#6e8e59" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon-180.png" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="panel hero">
      <div>
        <h1>四季の宝物</h1>
        <p>彌榮季節の食・気配・暮らしを発見</p>
      </div>
      <button id="addBtn" class="btn btn-primary admin-only hidden">＋ 記録</button>
    </header>

    <section class="panel toolbar">
      <select id="yearSelect" class="select compact"></select>
      <button id="prevBtn" class="btn compact">←</button>
      <div id="monthTitle" class="month-pill">4月</div>
      <button id="nextBtn" class="btn compact">→</button>
      <div class="spacer"></div>
      <button id="adminLoginBtn" class="btn">管理用に入る</button>
      <button id="adminLogoutBtn" class="btn admin-only hidden">ログアウト</button>
    </section>

    <section class="panel filters">
      <div class="picker-wrap">
        <button id="filterTrigger" type="button" class="btn picker-trigger">
          <span class="picker-value" id="filterValue">すべて</span><span>▾</span>
        </button>
        <div id="filterMenu" class="picker-menu"></div>
      </div>
      <select id="sortSelect" class="select">
        <option value="start">開始日順</option>
        <option value="category">カテゴリ順</option>
        <option value="name">名前順</option>
      </select>
      <button id="manageCatsBtn" class="btn admin-only hidden">カテゴリ管理</button>
      <div id="viewerNote" class="viewer-note">閲覧用：公開データを見る画面です。</div>
    </section>

    <section class="panel board">
      <div class="board-head">
        <h2 id="monthHeadline">2026年4月</h2>
        <div id="statusText" class="status-text">読み込み中…</div>
      </div>
      <div class="road-shell">
        <div class="names-wrap">
          <div id="nameGrid" class="names-grid"></div>
        </div>
        <div id="wrap" class="days-wrap">
          <div id="roadmap" class="gridline"></div>
        </div>
      </div>
      <div id="legend" class="legend"></div>
    </section>

    <section id="editor" class="panel editor hidden">
      <div class="editor-head">
        <h3 id="editorTitle">新しく記録する</h3>
        <button id="toggleEditor" class="btn compact">折りたたむ</button>
      </div>
      <div id="formMsg" class="msg"></div>
      <div id="editorBody" class="editor-body">
        <div class="field-grid">
          <div class="field full">
            <label for="name">たからもの名</label>
            <input id="name" type="text" placeholder="例：ふきのとう" />
          </div>

          <div class="field">
            <label for="start">開始日</label>
            <input id="start" type="date" />
          </div>

          <div class="field">
            <label for="end">終了日</label>
            <input id="end" type="date" />
          </div>

          <div class="field">
            <label>カテゴリ</label>
            <input id="categoryId" type="hidden" />
            <div class="picker-wrap">
              <button id="categoryTrigger" type="button" class="btn picker-trigger">
                <span class="picker-value" id="categoryValue">カテゴリを選択</span><span>▾</span>
              </button>
              <div id="categoryMenu" class="picker-menu"></div>
            </div>
          </div>

          <div class="field">
            <label>進行表の色</label>
            <input id="color" type="hidden" value="rose" />
            <div class="picker-wrap">
              <button id="colorTrigger" type="button" class="btn picker-trigger">
                <span class="picker-value" id="colorValue">さくら</span><span>▾</span>
              </button>
              <div id="colorMenu" class="picker-menu"></div>
            </div>
          </div>

          <div class="field full">
            <label for="detail">詳細メモ</label>
            <textarea id="detail" placeholder="詳細を記録"></textarea>
          </div>

          <div class="field full admin-only hidden">
            <label for="imageFile">画像アップロード</label>
            <input id="imageFile" type="file" accept="image/*" />
            <div class="image-tools">
              <div id="imagePreview" class="thumb">画像なし</div>
              <div class="image-side">
                <button id="removeImageBtn" type="button" class="btn">画像を外す</button>
                <div id="imageStatus" class="small-note">管理用のみ画像アップできます。</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="resetBtn" class="btn">入力をリセット</button>
        <button id="saveBtn" class="btn btn-primary">保存する</button>
      </div>
    </section>
  </div>

  <div id="detailModal" class="overlay">
    <div class="dialog large">
      <div class="dialog-head">
        <div>
          <div id="detailTitle" class="dialog-title"></div>
          <div id="detailMeta" class="meta"></div>
        </div>
        <div class="dialog-actions">
          <button id="detailDelete" class="btn btn-danger admin-only hidden">削除</button>
          <button id="detailEdit" class="btn admin-only hidden">修正</button>
          <button id="detailClose" class="btn">閉じる</button>
        </div>
      </div>
      <div class="detail-body">
        <div id="detailPhoto" class="photo">画像なし</div>
        <div id="detailNote" class="note"></div>
      </div>
    </div>
  </div>

  <div id="confirmModal" class="overlay">
    <div class="dialog small">
      <div class="dialog-title">本当に削除しますか</div>
      <p class="dialog-text">この記録を削除します。元に戻せません。</p>
      <div class="dialog-actions">
        <button id="confirmCancel" class="btn">キャンセル</button>
        <button id="confirmDelete" class="btn btn-danger">削除する</button>
      </div>
    </div>
  </div>

  <div id="loginModal" class="overlay">
    <div class="dialog small">
      <div class="dialog-title">管理者ログイン</div>
      <div class="field-grid one-col">
        <div class="field">
          <label for="loginEmail">メールアドレス</label>
          <input id="loginEmail" type="email" autocomplete="username" />
        </div>
        <div class="field">
          <label for="loginPassword">パスワード</label>
          <input id="loginPassword" type="password" autocomplete="current-password" />
        </div>
        <div id="loginMsg" class="msg"></div>
      </div>
      <div class="dialog-actions">
        <button id="loginCancel" class="btn">キャンセル</button>
        <button id="loginSubmit" class="btn btn-primary">ログイン</button>
      </div>
    </div>
  </div>

  <div id="catModal" class="overlay">
    <div class="dialog medium">
      <div class="dialog-head">
        <div class="dialog-title">カテゴリ管理</div>
        <button id="catClose" class="btn">閉じる</button>
      </div>

      <section class="cat-section">
        <h4>新規カテゴリ名登録</h4>
        <div class="field-grid cat-add-row">
          <div class="field">
            <label for="catAddInput">新しいカテゴリ名</label>
            <input id="catAddInput" type="text" placeholder="例：行事" />
          </div>
          <div class="field">
            <label for="catSortInput">並び順</label>
            <input id="catSortInput" type="number" placeholder="10" />
          </div>
          <button id="catAddBtn" class="btn btn-primary">追加する</button>
        </div>
      </section>

      <section class="cat-section">
        <h4>カテゴリ一覧</h4>
        <div class="small-note">削除時は移動先カテゴリを選んでから削除します。</div>
        <div id="catList"></div>
      </section>
    </div>
  </div>

  <div id="catActionModal" class="overlay">
    <div class="dialog small">
      <div id="catActionTitle" class="dialog-title">カテゴリ操作</div>
      <div id="catActionBody" class="field-grid one-col"></div>
      <div class="dialog-actions">
        <button id="catActionCancel" class="btn">キャンセル</button>
        <button id="catActionSubmit" class="btn btn-primary">実行する</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/supabase.js"></script>
  <script src="./assets/auth.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>
